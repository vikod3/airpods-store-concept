<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Audio Product Showcase</title>
<style>
  html, body { margin: 0; padding: 0; background: transparent; }

  #ambient-bg { position: fixed; inset: 0; width: 100vw; height: 100vh; z-index: 0; pointer-events: none; background: #F6E2DE; display: flex; align-items: center; justify-content: center; overflow: hidden; }
  a { color: #1a1a1a; text-decoration: none; }
  a:hover { color: #e2574c; }

  @font-face { font-family: 'Substance'; src: url('assets/fonts/substance-thin.otf') format('opentype'); font-weight: 100; font-style: normal; }
  @font-face { font-family: 'Substance'; src: url('assets/fonts/substance-extralight.otf') format('opentype'); font-weight: 200; font-style: normal; }
  @font-face { font-family: 'Substance'; src: url('assets/fonts/substance-light.otf') format('opentype'); font-weight: 300; font-style: normal; }
  @font-face { font-family: 'Substance'; src: url('assets/fonts/substance-regular.otf') format('opentype'); font-weight: 400; font-style: normal; }
  @font-face { font-family: 'Substance'; src: url('assets/fonts/substance-medium.otf') format('opentype'); font-weight: 500; font-style: normal; }
  @font-face { font-family: 'Substance'; src: url('assets/fonts/substance-bold.otf') format('opentype'); font-weight: 700; font-style: normal; }
  @font-face { font-family: 'Substance'; src: url('assets/fonts/substance-extrabold.otf') format('opentype'); font-weight: 800; font-style: normal; }
  @font-face { font-family: 'Substance'; src: url('assets/fonts/substance-black.otf') format('opentype'); font-weight: 900; font-style: normal; }

  @keyframes dcRise   { from { opacity: 0; transform: translateY(28px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes dcRiseSm { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes dcFade   { from { opacity: 0; } to { opacity: 1; } }
  @keyframes dcInLeft { from { opacity: 0; transform: translateX(-18px); } to { opacity: 1; transform: translateX(0); } }
  @keyframes dcPop    { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }
  @keyframes dcScale  { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
  @keyframes dcRiseC  { from { opacity: 0; transform: translateX(-50%) translateY(18px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
  @keyframes dcKen    { from { transform: scale(1.16); } to { transform: scale(1); } }

  .dc-a      { animation-duration: 0.85s; animation-fill-mode: backwards; animation-timing-function: cubic-bezier(0.22, 1, 0.36, 1); }
  .dc-rise   { animation-name: dcRise; }
  .dc-risesm { animation-name: dcRiseSm; }
  .dc-fade   { animation-name: dcFade; }
  .dc-inleft { animation-name: dcInLeft; }
  .dc-pop    { animation-name: dcPop; animation-timing-function: cubic-bezier(0.34, 1.5, 0.5, 1); }
  .dc-scale  { animation-name: dcScale; animation-duration: 1s; }
  .dc-risec  { animation-name: dcRiseC; }

  .dc-d1 { animation-delay: 0.08s; } .dc-d2 { animation-delay: 0.16s; }
  .dc-d3 { animation-delay: 0.26s; } .dc-d4 { animation-delay: 0.36s; }
  .dc-d5 { animation-delay: 0.46s; } .dc-d6 { animation-delay: 0.58s; }
  .dc-d7 { animation-delay: 0.70s; } .dc-d8 { animation-delay: 0.84s; }
  .dc-d9 { animation-delay: 1.00s; } .dc-d10 { animation-delay: 1.16s; }

  .dc-stagger > *, .dc-stagger2 > * { animation: dcRiseSm 0.8s backwards cubic-bezier(0.22, 1, 0.36, 1); }
  .dc-stagger  > *:nth-child(1) { animation-delay: 0.38s; }
  .dc-stagger  > *:nth-child(2) { animation-delay: 0.50s; }
  .dc-stagger  > *:nth-child(3) { animation-delay: 0.62s; }
  .dc-stagger  > *:nth-child(4) { animation-delay: 0.74s; }
  .dc-stagger  > *:nth-child(5) { animation-delay: 0.86s; }
  .dc-stagger2 > *:nth-child(1) { animation-delay: 0.64s; }
  .dc-stagger2 > *:nth-child(2) { animation-delay: 0.76s; }
  .dc-stagger2 > *:nth-child(3) { animation-delay: 0.88s; }
  .dc-stagger2 > *:nth-child(4) { animation-delay: 1.00s; }

  .dc-hero-img { animation: dcFade 1.4s backwards ease, dcKen 16s 0.1s ease-out both; }

  @media (prefers-reduced-motion: reduce) {
    .dc-a, .dc-hero-img, .dc-stagger > *, .dc-stagger2 > * { animation: none !important; }
  }

  @media (max-width: 1000px) {
    .dc-screens { flex-direction: column; }
  }

  .ios-dynamic-island { position: absolute; top: 11px; left: 50%; transform: translateX(-50%); width: 120px; height: 35px; border-radius: 22px; background: #000; z-index: 50; }
  .ios-status-bar-wrap { position: absolute; top: 0; left: 0; right: 0; z-index: 40; pointer-events: none; }
  .ios-status-bar { display: flex; gap: 140px; align-items: center; justify-content: center; padding: 19px 28px 14px; box-sizing: border-box; width: 100%; }
  .ios-status-bar .ios-time-col { flex: 1; height: 22px; display: flex; align-items: center; justify-content: center; }
  .ios-status-bar .ios-time-col span { font-family: -apple-system, 'SF Pro Text', system-ui, sans-serif; font-weight: 600; font-size: 16px; line-height: 22px; }
  .ios-status-bar .ios-icons-col { flex: 1; height: 22px; display: flex; align-items: center; justify-content: center; gap: 7px; }
  .ios-home-indicator-wrap { position: absolute; bottom: 0; left: 0; right: 0; z-index: 60; height: 30px; display: flex; justify-content: center; align-items: flex-end; padding-bottom: 8px; pointer-events: none; }
  .ios-home-indicator-bar { width: 134px; height: 5px; border-radius: 100px; }
</style>
</head>
